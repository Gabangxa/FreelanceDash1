{% if daily_hours|sum > 0 %}
    <canvas id="timeTrackingChart" height="100"></canvas>
    <script>
        // Initialize the chart with new data
        const ctx = document.getElementById('timeTrackingChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Hours Worked',
                    data: {{ daily_hours|tojson }},
                    backgroundColor: 'rgba(13, 110, 253, 0.5)',
                    borderColor: 'rgb(13, 110, 253)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                animation: {
                    duration: 800,
                    easing: 'easeOutQuart'
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Hours'
                        }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `${context.parsed.y.toFixed(1)} hours`;
                            }
                        }
                    }
                }
            }
        });
    </script>
{% else %}
    <div class="text-center py-5 text-muted">
        <i class="fas fa-chart-line fa-3x mb-3"></i>
        <p>No time tracking data available for this week.</p>
        <p>
            <a href="{{ url_for('projects.batch_time_entries') }}" class="btn btn-sm btn-primary">
                <i class="fas fa-plus me-1"></i>Add Time Entries
            </a>
        </p>
    </div>
{% endif %}
